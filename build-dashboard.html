/* =========================== STORAGE ============================= */
/* Wrapped in try/catch — falls back to in-memory if window.storage unavailable */
const memoryStore = new Map();

async function storageGet(key) {
  try {
    if (window.storage && typeof window.storage.get === 'function') {
      const v = await window.storage.get(key, { shared: true });
      return v == null ? null : v;
    }
    if (window.storage && typeof window.storage.getItem === 'function') {
      const v = await window.storage.getItem(key, { shared: true });
      return v == null ? null : v;
    }
  } catch (e) {
    console.warn('[storage.get] falling back to memory:', e.message);
  }
  return memoryStore.has(key) ? memoryStore.get(key) : null;
}

async function storageSet(key, value) {
  try {
    if (window.storage && typeof window.storage.set === 'function') {
      await window.storage.set(key, value, { shared: true });
      return true;
    }
    if (window.storage && typeof window.storage.setItem === 'function') {
      await window.storage.setItem(key, value, { shared: true });
      return true;
    }
  } catch (e) {
    console.warn('[storage.set] falling back to memory:', e.message);
  }
  memoryStore.set(key, value);
  return false;
}

async function loadBuilds() {
  const raw = await storageGet(STORAGE_KEY);
  if (!raw) return [];
  try {
    const parsed = typeof raw === 'string' ? JSON.parse(raw) : raw;
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) {
    console.error('[loadBuilds] parse error:', e);
    return [];
  }
}

async function saveBuilds(builds) {
  const payload = JSON.stringify(builds);
  return await storageSet(STORAGE_KEY, payload);
}

async function loadMeta() {
  const raw = await storageGet(META_KEY);
  if (!raw) return { lastSynced: null };
  try {
    return typeof raw === 'string' ? JSON.parse(raw) : raw;
  } catch { return { lastSynced: null }; }
}

async function saveMeta(meta) {
  return await storageSet(META_KEY, JSON.stringify(meta));
}

/* ============================ PARSER ============================= */
/* Parses the exact STATUS BLOCK format from the project instructions */
function parseStatusBlock(text) {
  if (!text || typeof text !== 'string') return null;
  const cleaned = text.replace(/\r\n/g, '\n');
  // optional ### BUILD STATUS header
  const lines = cleaned.split('\n').map(l => l.trim()).filter(Boolean);
  const fields = {};
  const fieldNames = [
    'phase','unit','version','migration','tests','rls_tests','ui',
    'committed','what_went_well','what_went_wrong','blocked_by','next_unit'
  ];
  for (const ln of lines) {
    // skip the header line
    if (/^#+\s*BUILD\s*STATUS/i.test(ln)) continue;
    const m = ln.match(/^([a-zA-Z_]+)\s*:\s*(.*)$/);
    if (m) {
      const k = m[1].toLowerCase();
      if (fieldNames.includes(k)) {
        fields[k] = m[2].trim();
      }
    }
  }
  if (Object.keys(fields).length === 0) return null;

  // Migration: "Done — file.sql" or "Done"
  let migrationStatus = '', migrationFile = '';
  if (fields.migration) {
    const parts = fields.migration.split(/[—\-–]\s*/);
    migrationStatus = (parts[0] || '').trim();
    migrationFile = (parts.slice(1).join(' — ') || '').trim();
  }

  // tests "5/6"
  const parseRatio = (s) => {
    if (!s) return { passed: 0, total: 0 };
    const m = s.match(/(\d+)\s*\/\s*(\d+)/);
    if (m) return { passed: parseInt(m[1], 10), total: parseInt(m[2], 10) };
    return { passed: 0, total: 0 };
  };
  const tests = parseRatio(fields.tests);
  const rls = parseRatio(fields.rls_tests);

  // version "v3" → 3
  let version = null;
  if (fields.version) {
    const vm = fields.version.match(/v?(\d+)/i);
    if (vm) version = parseInt(vm[1], 10);
  }
  let phase = null;
  if (fields.phase) {
    const pm = fields.phase.match(/(\d+)/);
    if (pm) phase = parseInt(pm[1], 10);
  }

  // committed: git sha or "pending"
  let committed = false, gitSha = '';
  if (fields.committed) {
    const cv = fields.committed.toLowerCase();
    if (cv && cv !== 'pending' && cv !== 'no' && cv !== 'false' && cv !== 'na' && cv !== '-') {
      committed = true;
      gitSha = fields.committed;
    }
  }

  return {
    phase: phase ?? '',
    unit: fields.unit || '',
    version,
    migration: { status: migrationStatus || 'Pending', file: migrationFile },
    tests,
    rlsTests: rls,
    ui: fields.ui || 'Pending',
    committed,
    gitSha,
    whatWentWell: fields.what_went_well || '',
    whatWentWrong: fields.what_went_wrong || '',
    blockedBy: fields.blocked_by || '',
    nextUnit: fields.next_unit || '',
    checklist: [],
  };
}

/* ============================ HELPERS ============================ */
const ratio = (p, t) => (t === 0 ? 0 : Math.round((p / t) * 100));

function formatRelative(iso) {
  if (!iso) return '—';
  const then = new Date(iso).getTime();
  const now = Date.now();
  const s = Math.floor((now - then) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  if (s < 86400 * 7) return `${Math.floor(s/86400)}d ago`;
  return new Date(iso).toLocaleDateString();
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function statusChipClass(s) {
  if (!s) return 'chip-gray';
  const v = String(s).toLowerCase();
  if (v.includes('done') || v.includes('pass')) return 'chip-green';
  if (v.includes('fail') || v.includes('block')) return 'chip-red';
  if (v.includes('progress')) return 'chip-amber';
  if (v.includes('na') || v === '—') return 'chip-gray';
  if (v.includes('pend')) return 'chip-blue';
  return 'chip-gray';
}

function downloadJSON(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 200);
}

function nextVersion(builds) {
  if (!builds || builds.length === 0) return 1;
  return Math.max(...builds.map(b => b.version || 0)) + 1;
}

function makeBuildId() {
  return 'b_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

/* ================== FILE SYSTEM ACCESS (auto-sync) ================
   Binds to build-log.jsonl in the project folder. Polled every 4s.
   Each line is one build JSON object. Entries dedupe by id (or
   version+unit fallback). One-time permission grant; handle persisted
   via IndexedDB so it survives page reloads.                          */
const IDB_NAME = 'occasionpro-fsa';
const IDB_STORE = 'handles';
function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key) {
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  } catch (_) { return null; }
}
async function idbSet(key, value) {
  try {
    const db = await idbOpen();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(value, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
    return true;
  } catch (_) { return false; }
}
const FSA_SUPPORTED = typeof window !== 'undefined' && 'showOpenFilePicker' in window;
async function pickLogFile() {
  if (!FSA_SUPPORTED) throw new Error('File System Access API not supported. Use Chrome, Edge, Brave, or Arc.');
  const [handle] = await window.showOpenFilePicker({
    types: [{ description: 'Build log (JSONL)', accept: { 'application/jsonl': ['.jsonl'], 'application/json': ['.json'], 'text/plain': ['.txt'] } }],
    multiple: false,
  });
  return handle;
}
async function ensureReadPermission(handle) {
  if (!handle || !handle.queryPermission) return false;
  const opts = { mode: 'read' };
  if ((await handle.queryPermission(opts)) === 'granted') return true;
  return (await handle.requestPermission(opts)) === 'granted';
}
async function readBuildsFromFile(handle) {
  const file = await handle.getFile();
  const text = await file.text();
  const lastModified = file.lastModified;
  if (!text.trim()) return { builds: [], lastModified };
  const builds = [];
  // JSONL first
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  for (const ln of lines) {
    try {
      const obj = JSON.parse(ln);
      if (obj && typeof obj === 'object' && !Array.isArray(obj)) builds.push(obj);
    } catch (_) { /* skip malformed */ }
  }
  // fall back to whole-file array if JSONL parse yielded nothing
  if (builds.length === 0) {
    try {
      const parsed = JSON.parse(text);
      if (Array.isArray(parsed)) builds.push(...parsed);
      else if (parsed && Array.isArray(parsed.builds)) builds.push(...parsed.builds);
    } catch (_) {}
  }
  return { builds, lastModified };
}
function mergeBuildEntries(existing, incoming) {
  const map = new Map();
  const keyOf = (b) => b.id || `${b.version}|${(b.unit||'').toLowerCase()}|${b.timestamp||''}`;
  for (const b of existing) map.set(keyOf(b), b);
  for (const b of incoming) {
    const k = keyOf(b);
    const normalized = {
      ...b,
      id: b.id || makeBuildId(),
      tests: b.tests || { passed: 0, total: 0 },
      rlsTests: b.rlsTests || { passed: 0, total: 0 },
      migration: b.migration || { status: 'Pending', file: '' },
      checklist: b.checklist || [],
      timestamp: b.timestamp || new Date().toISOString(),
    };
    map.set(k, { ...map.get(k), ...normalized });
  }
  return Array.from(map.values()).sort((a, b) => (b.version || 0) - (a.version || 0));
}

/* Determine an overall pass/fail/in-progress for a build */
function overallStatus(b) {
  const m = (b.migration?.status || '').toLowerCase();
  if (m === 'failed') return 'failed';
  if ((b.blockedBy || '').trim() && b.blockedBy.trim().toLowerCase() !== 'none') return 'blocked';
  const testsOk = b.tests.total === 0 ? true : b.tests.passed === b.tests.total;
  const rlsOk = b.rlsTests.total === 0 ? true : b.rlsTests.passed === b.rlsTests.total;
  if (!testsOk || !rlsOk) return 'failed';
  if (m === 'done' && (b.ui || '').toLowerCase() === 'done' && b.committed) return 'passed';
  return 'in_progress';
}

/* ============================ APP ROOT =========================== */
function App() {
  const [builds, setBuilds] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('overview');
  const [showAdd, setShowAdd] = useState(false);
  const [showPaste, setShowPaste] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [showClear, setShowClear] = useState(false);
  const [selectedBuild, setSelectedBuild] = useState(null);
  const [moreOpen, setMoreOpen] = useState(false);
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | synced | error
  const [lastSynced, setLastSynced] = useState(null);
  const [toast, setToast] = useState(null);
  const [fileHandle, setFileHandle] = useState(null);
  const [fileConnected, setFileConnected] = useState(false);
  const [fileName, setFileName] = useState('');
  const [fileLastSeen, setFileLastSeen] = useState(0);
  const lastModRef = useRef(0);

  /* initial load */
  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true);
      try {
        const data = await loadBuilds();
        const meta = await loadMeta();
        if (!cancelled) {
          setBuilds(data);
          setLastSynced(meta.lastSynced);
          setSyncStatus('synced');
        }
      } catch (e) {
        if (!cancelled) {
          setSyncStatus('error');
          showToast('Could not load builds — using local memory', 'error');
        }
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  /* polling refresh — picks up writes from other chats */
  useEffect(() => {
    let cancelled = false;
    const interval = setInterval(async () => {
      if (cancelled) return;
      try {
        const data = await loadBuilds();
        if (cancelled) return;
        setBuilds(prev => {
          if (data.length !== prev.length) return data;
          // shallow check for last entry id
          if (data.length && prev.length && data[0].id !== prev[0].id) return data;
          return prev;
        });
      } catch (_) {}
    }, 8000);
    return () => { cancelled = true; clearInterval(interval); };
  }, []);

  /* file binding — restore persisted handle on load */
  useEffect(() => {
    (async () => {
      const handle = await idbGet('logFile');
      if (!handle) return;
      try {
        const granted = await ensureReadPermission(handle);
        if (granted) {
          setFileHandle(handle);
          setFileName(handle.name || 'build-log.jsonl');
          setFileConnected(true);
        } else {
          // need a user gesture to re-grant; mark as pending
          setFileHandle(handle);
          setFileName(handle.name || 'build-log.jsonl');
          setFileConnected(false);
        }
      } catch (_) {}
    })();
  }, []);

  /* file polling — every 4s, read file, merge new entries */
  useEffect(() => {
    if (!fileHandle || !fileConnected) return;
    let cancelled = false;
    const tick = async () => {
      if (cancelled) return;
      try {
        const file = await fileHandle.getFile();
        if (file.lastModified === lastModRef.current) return;
        lastModRef.current = file.lastModified;
        const { builds: incoming, lastModified } = await readBuildsFromFile(fileHandle);
        if (cancelled) return;
        setFileLastSeen(lastModified);
        setBuilds(prev => {
          const merged = mergeBuildEntries(prev, incoming);
          // persist back to shared storage so other chats see it
          if (merged.length !== prev.length || merged.some((m, i) => m.id !== prev[i]?.id)) {
            persist(merged);
            return merged;
          }
          return prev;
        });
      } catch (e) {
        if (e && e.name === 'NotAllowedError') {
          setFileConnected(false);
        }
      }
    };
    tick();
    const id = setInterval(tick, 4000);
    return () => { cancelled = true; clearInterval(id); };
  }, [fileHandle, fileConnected, persist]);

  const showToast = useCallback((msg, kind = 'info') => {
    setToast({ msg, kind, t: Date.now() });
    setTimeout(() => setToast(t => (t && t.msg === msg ? null : t)), 3200);
  }, []);

  const persist = useCallback(async (next) => {
    setSyncStatus('syncing');
    try {
      await saveBuilds(next);
      const now = new Date().toISOString();
      await saveMeta({ lastSynced: now });
      setLastSynced(now);
      setSyncStatus('synced');
    } catch (e) {
      setSyncStatus('error');
      showToast('Sync failed — kept locally', 'error');
    }
  }, [showToast]);

  const addBuild = useCallback(async (partial) => {
    const id = makeBuildId();
    const v = partial.version && partial.version > 0 ? partial.version : nextVersion(builds);
    const entry = {
      id,
      version: v,
      timestamp: partial.timestamp || new Date().toISOString(),
      phase: partial.phase || '',
      unit: partial.unit || '',
      migration: partial.migration || { status: 'Pending', file: '' },
      tests: partial.tests || { passed: 0, total: 0 },
      rlsTests: partial.rlsTests || { passed: 0, total: 0 },
      ui: partial.ui || 'Pending',
      committed: !!partial.committed,
      gitSha: partial.gitSha || '',
      whatWentWell: partial.whatWentWell || '',
      whatWentWrong: partial.whatWentWrong || '',
      blockedBy: partial.blockedBy || '',
      nextUnit: partial.nextUnit || '',
      checklist: partial.checklist || [],
    };
    const next = [entry, ...builds].sort((a, b) => b.version - a.version);
    setBuilds(next);
    await persist(next);
    showToast(`Build v${entry.version} logged`, 'success');
    return entry;
  }, [builds, persist, showToast]);

  const updateBuild = useCallback(async (id, updater) => {
    const next = builds.map(b => b.id === id ? { ...b, ...updater(b) } : b);
    setBuilds(next);
    await persist(next);
  }, [builds, persist]);

  const removeBuild = useCallback(async (id) => {
    const next = builds.filter(b => b.id !== id);
    setBuilds(next);
    await persist(next);
    showToast('Build removed', 'info');
  }, [builds, persist, showToast]);

  const clearAll = useCallback(async () => {
    setBuilds([]);
    await persist([]);
    setShowClear(false);
    showToast('All builds cleared', 'info');
  }, [persist, showToast]);

  const connectLogFile = useCallback(async () => {
    try {
      const handle = await pickLogFile();
      const granted = await ensureReadPermission(handle);
      if (!granted) throw new Error('Permission denied');
      await idbSet('logFile', handle);
      lastModRef.current = 0;
      setFileHandle(handle);
      setFileName(handle.name || 'build-log.jsonl');
      setFileConnected(true);
      showToast(`Live · ${handle.name}`, 'success');
    } catch (e) {
      if (e && e.name === 'AbortError') return;
      showToast('Connect failed: ' + (e.message || e), 'error');
    }
  }, [showToast]);

  const disconnectLogFile = useCallback(async () => {
    await idbSet('logFile', null);
    setFileHandle(null);
    setFileConnected(false);
    setFileName('');
    lastModRef.current = 0;
    showToast('Disconnected log file', 'info');
  }, [showToast]);

  const handleExport = useCallback(() => {
    const payload = {
      schema: 'occasionpro.build-log',
      version: 1,
      exportedAt: new Date().toISOString(),
      builds,
    };
    downloadJSON(`occasionpro-build-log-${new Date().toISOString().slice(0,10)}.json`, payload);
    showToast(`Exported ${builds.length} build${builds.length === 1 ? '' : 's'}`, 'success');
    setMoreOpen(false);
  }, [builds, showToast]);

  const handleImport = useCallback(async (file, mode) => {
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      const incoming = Array.isArray(parsed) ? parsed : (parsed.builds || []);
      if (!Array.isArray(incoming)) throw new Error('Bad format');
      let next;
      if (mode === 'replace') {
        next = incoming;
      } else {
        // merge by id (or version+unit if no id)
        const map = new Map(builds.map(b => [b.id || `${b.version}|${b.unit}`, b]));
        for (const b of incoming) {
          const key = b.id || `${b.version}|${b.unit}`;
          map.set(key, { ...map.get(key), ...b, id: b.id || makeBuildId() });
        }
        next = Array.from(map.values());
      }
      next = next
        .filter(b => b && typeof b === 'object')
        .map(b => ({
          ...b,
          id: b.id || makeBuildId(),
          tests: b.tests || { passed: 0, total: 0 },
          rlsTests: b.rlsTests || { passed: 0, total: 0 },
          migration: b.migration || { status: 'Pending', file: '' },
          checklist: b.checklist || [],
          timestamp: b.timestamp || new Date().toISOString(),
        }))
        .sort((a, b) => (b.version || 0) - (a.version || 0));
      setBuilds(next);
      await persist(next);
      showToast(`Imported ${incoming.length} build${incoming.length === 1 ? '' : 's'}`, 'success');
      setShowImport(false);
    } catch (e) {
      showToast('Import failed: ' + e.message, 'error');
    }
  }, [builds, persist, showToast]);

  /* aggregated stats */
  const stats = useMemo(() => computeStats(builds), [builds]);

  if (loading) return <Loading />;

  return (
    <div className="min-h-screen flex flex-col">
      <Header
        builds={builds}
        stats={stats}
        onAdd={() => setShowAdd(true)}
        onPaste={() => setShowPaste(true)}
        moreOpen={moreOpen}
        setMoreOpen={setMoreOpen}
        onExport={handleExport}
        onImport={() => { setShowImport(true); setMoreOpen(false); }}
        onClear={() => { setShowClear(true); setMoreOpen(false); }}
        syncStatus={syncStatus}
        lastSynced={lastSynced}
        fileConnected={fileConnected}
        fileName={fileName}
        fileLastSeen={fileLastSeen}
        onConnectFile={connectLogFile}
        onDisconnectFile={disconnectLogFile}
      />

      <div className="flex-1 flex" style={{ minHeight: 0 }}>
        <Sidebar view={view} setView={setView} stats={stats} />
        <main className="flex-1 overflow-y-auto" style={{ paddingBottom: 64 }}>
          <div className="max-w-[1480px] mx-auto px-8 py-8 fade-in" key={view}>
            {builds.length === 0 ? (
              <EmptyState onAdd={() => setShowAdd(true)} onPaste={() => setShowPaste(true)} />
            ) : view === 'overview' ? (
              <OverviewView builds={builds} stats={stats} onSelect={setSelectedBuild} />
            ) : view === 'history' ? (
              <HistoryView builds={builds} onSelect={setSelectedBuild} onDelete={removeBuild} />
            ) : view === 'compare' ? (
              <CompareView builds={builds} />
            ) : view === 'checklist' ? (
              <ChecklistView builds={builds} onSelect={setSelectedBuild} updateBuild={updateBuild} />
            ) : view === 'log' ? (
              <LogView builds={builds} onSelect={setSelectedBuild} />
            ) : null}
          </div>
        </main>
      </div>

      {showAdd && (
        <AddBuildModal
          defaultVersion={nextVersion(builds)}
          onClose={() => setShowAdd(false)}
          onSubmit={async (data) => { await addBuild(data); setShowAdd(false); }}
        />
      )}
      {showPaste && (
        <PasteLogModal
          defaultVersion={nextVersion(builds)}
          onClose={() => setShowPaste(false)}
          onSubmit={async (data) => { await addBuild(data); setShowPaste(false); }}
        />
      )}
      {showImport && (
        <ImportModal onClose={() => setShowImport(false)} onImport={handleImport} buildsCount={builds.length} />
      )}
      {showClear && (
        <ConfirmModal
          title="Clear all builds?"
          description={`This permanently removes all ${builds.length} build records from the shared store across every chat in this project. Export a backup first if you want one.`}
          confirmLabel="Yes, delete everything"
          danger
          onConfirm={clearAll}
          onCancel={() => setShowClear(false)}
        />
      )}
      {selectedBuild && (
        <DetailDrawer
          build={selectedBuild}
          onClose={() => setSelectedBuild(null)}
          onUpdate={async (next) => {
            await updateBuild(selectedBuild.id, () => next);
            setSelectedBuild({ ...selectedBuild, ...next });
          }}
          onDelete={async () => {
            await removeBuild(selectedBuild.id);
            setSelectedBuild(null);
          }}
        />
      )}

      {toast && <Toast {...toast} />}
    </div>
  );
}

/* ============================ HEADER ============================= */
function Header({ builds, stats, onAdd, onPaste, moreOpen, setMoreOpen, onExport, onImport, onClear, syncStatus, lastSynced, fileConnected, fileName, fileLastSeen, onConnectFile, onDisconnectFile }) {
  const moreRef = useRef(null);
  useEffect(() => {
    const onClick = (e) => { if (moreRef.current && !moreRef.current.contains(e.target)) setMoreOpen(false); };
    if (moreOpen) document.addEventListener('mousedown', onClick);
    return () => document.removeEventListener('mousedown', onClick);
  }, [moreOpen, setMoreOpen]);

  const syncDot = {
    idle: 'bg-zinc-500',
    syncing: 'bg-amber-400 pulse-dot',
    synced: 'bg-emerald-400',
    error: 'bg-rose-500',
  }[syncStatus];
  const syncLabel = {
    idle: 'Idle',
    syncing: 'Syncing…',
    synced: 'Synced across all project chats',
    error: 'Sync error — local only',
  }[syncStatus];

  return (
    <header className="border-b" style={{ borderColor: 'var(--border-faint)', background: 'rgba(7,7,12,0.85)', backdropFilter: 'blur(14px)', position: 'sticky', top: 0, zIndex: 30 }}>
      <div className="max-w-[1480px] mx-auto px-8 h-[68px] flex items-center justify-between gap-6">
        <div className="flex items-center gap-4 min-w-0">
          <div className="flex items-center gap-3 min-w-0">
            <div className="relative w-10 h-10 rounded-xl gradient-bg flex items-center justify-center shadow-lg" style={{ boxShadow: '0 8px 28px -6px rgba(251,113,133,0.4)' }}>

/* =========================== STATS =============================== */
function computeStats(builds) {
  const phaseMap = new Map(PHASES.map(p => [p.id, { ...p, units: new Map(), latestBuild: null }]));
  let totalTests = 0, totalTestsPassed = 0, totalRls = 0, totalRlsPassed = 0;
  let blocked = 0, inProgress = 0, unitsDone = 0;
  let currentVersion = 0;
  let lastActivity = null;

  for (const b of builds) {
    if (b.version > currentVersion) currentVersion = b.version;
    if (!lastActivity || (b.timestamp && b.timestamp > lastActivity)) lastActivity = b.timestamp;
    totalTests += b.tests?.total || 0;
    totalTestsPassed += b.tests?.passed || 0;
    totalRls += b.rlsTests?.total || 0;
    totalRlsPassed += b.rlsTests?.passed || 0;
    const ph = phaseMap.get(Number(b.phase));
    if (!ph) continue;
    const unitKey = (b.unit || '(unnamed)').toLowerCase();
    const existing = ph.units.get(unitKey);
    if (!existing || existing.version < b.version) {
      ph.units.set(unitKey, b);
    }
    if (!ph.latestBuild || (b.timestamp && b.timestamp > (ph.latestBuild.timestamp || ''))) {
      ph.latestBuild = b;
    }
  }

  // tally per-phase unit status
  const phases = [];
  for (const ph of phaseMap.values()) {
    let done = 0, ip = 0, blk = 0, failed = 0, total = 0;
    let pTests = 0, pTestsPass = 0, pRls = 0, pRlsPass = 0;
    for (const b of ph.units.values()) {
      total++;
      const s = overallStatus(b);
      if (s === 'passed') done++;
      else if (s === 'failed') failed++;
      else if (s === 'blocked') blk++;
      else ip++;
      pTests += b.tests?.total || 0; pTestsPass += b.tests?.passed || 0;
      pRls += b.rlsTests?.total || 0; pRlsPass += b.rlsTests?.passed || 0;
    }
    phases.push({
      id: ph.id, name: ph.name, short: ph.short, hint: ph.hint,
      units: total, done, inProgress: ip, blocked: blk, failed,
      tests: { passed: pTestsPass, total: pTests },
      rlsTests: { passed: pRlsPass, total: pRls },
      latestBuild: ph.latestBuild,
    });
    unitsDone += done; inProgress += ip; blocked += blk;
  }

  const phasesActive = phases.filter(p => p.units > 0).length;
  return {
    phases, totalTests, totalTestsPassed, totalRls, totalRlsPassed,
    currentVersion, blocked, inProgress, unitsDone, phasesActive,
    lastActivity,
  };
}

function statusChipForOverall(s) {
  return { passed: 'chip-green', failed: 'chip-red', blocked: 'chip-amber', in_progress: 'chip-blue' }[s] || 'chip-gray';
}
function StatusIcon({ status, size = 11 }) {
  if (status === 'passed') return <IcCheckCircle size={size} stroke={2} />;
  if (status === 'failed') return <IcXCircle size={size} stroke={2} />;
  if (status === 'blocked') return <IcAlert size={size} stroke={2} />;
  if (status === 'in_progress') return <IcClock size={size} stroke={2} />;
  return <IcCircle size={size} stroke={2} />;
}

/* ============================ HISTORY ============================ */
function HistoryView({ builds, onSelect, onDelete }) {
  const [q, setQ] = useState('');
  const [phaseFilter, setPhaseFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('all');
  const [sortKey, setSortKey] = useState('version-desc');

  const filtered = useMemo(() => {
    const text = q.trim().toLowerCase();
    let arr = builds.filter(b => {
      if (phaseFilter !== 'all' && Number(b.phase) !== Number(phaseFilter)) return false;
      if (statusFilter !== 'all' && overallStatus(b) !== statusFilter) return false;
      if (!text) return true;
      const hay = [
        b.unit, b.gitSha, b.whatWentWell, b.whatWentWrong, b.blockedBy, b.nextUnit, b.migration?.file
      ].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(text) || (`v${b.version}`.includes(text));
    });
    const [k, dir] = sortKey.split('-');
    arr.sort((a, b) => {
      let av, bv;
      if (k === 'version') { av = a.version || 0; bv = b.version || 0; }
      else if (k === 'phase') { av = Number(a.phase) || 0; bv = Number(b.phase) || 0; }
      else if (k === 'time') { av = a.timestamp || ''; bv = b.timestamp || ''; }
      else if (k === 'unit') { av = (a.unit || '').toLowerCase(); bv = (b.unit || '').toLowerCase(); }
      if (av < bv) return dir === 'asc' ? -1 : 1;
      if (av > bv) return dir === 'asc' ? 1 : -1;
      return 0;
    });
    return arr;
  }, [builds, q, phaseFilter, statusFilter, sortKey]);

  return (
    <div className="space-y-6">
      <SectionHeader
        eyebrow="Version control"
        title="Version History"
        subtitle={`${builds.length} total · showing ${filtered.length} after filters`}
      />

      <div className="card p-3 flex flex-wrap items-center gap-2">
        <div className="relative flex-1 min-w-[240px]">
          <IcSearch size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500" />
          <input
            className="input pl-9"
            placeholder="Search version, unit, git sha, notes…"
            value={q}
            onChange={(e) => setQ(e.target.value)}
          />
        </div>
        <select className="select w-auto min-w-[160px]" value={phaseFilter} onChange={(e) => setPhaseFilter(e.target.value)}>
          <option value="all">All phases</option>
          {PHASES.map(p => <option key={p.id} value={p.id}>P{p.id} · {p.short}</option>)}
        </select>
        <select className="select w-auto min-w-[150px]" value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)}>
          <option value="all">All statuses</option>
          <option value="passed">Passed</option>
          <option value="failed">Failed</option>
          <option value="blocked">Blocked</option>
          <option value="in_progress">In progress</option>
        </select>
        <select className="select w-auto min-w-[160px]" value={sortKey} onChange={(e) => setSortKey(e.target.value)}>
          <option value="version-desc">Version ↓ (newest)</option>
          <option value="version-asc">Version ↑ (oldest)</option>
          <option value="time-desc">Time ↓</option>
          <option value="time-asc">Time ↑</option>
          <option value="phase-asc">Phase ↑</option>
          <option value="unit-asc">Unit A–Z</option>
        </select>
        {(q || phaseFilter !== 'all' || statusFilter !== 'all') && (
          <button onClick={() => { setQ(''); setPhaseFilter('all'); setStatusFilter('all'); }} className="btn btn-ghost">
            <IcX size={13} /> Clear
          </button>
        )}
      </div>

      <VirtualizedList items={filtered} onSelect={onSelect} onDelete={onDelete} />
    </div>
  );
}

/* Virtualized vertical list — scales to thousands */
function VirtualizedList({ items, onSelect, onDelete }) {
  const ROW_H = 76;
  const BUFFER = 6;
  const containerRef = useRef(null);
  const [scrollTop, setScrollTop] = useState(0);
  const [containerH, setContainerH] = useState(800);

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const onScroll = () => setScrollTop(el.scrollTop);
    el.addEventListener('scroll', onScroll, { passive: true });
    const ro = new ResizeObserver(() => setContainerH(el.clientHeight));
    ro.observe(el);
    return () => { el.removeEventListener('scroll', onScroll); ro.disconnect(); };
  }, []);

  const total = items.length;
  const startIdx = Math.max(0, Math.floor(scrollTop / ROW_H) - BUFFER);
  const visibleCount = Math.ceil(containerH / ROW_H) + BUFFER * 2;
  const endIdx = Math.min(total, startIdx + visibleCount);
  const slice = items.slice(startIdx, endIdx);
  const offsetTop = startIdx * ROW_H;
  const totalH = total * ROW_H;

  if (total === 0) {
    return (
      <div className="card p-12 text-center">
        <IcSearch size={28} className="mx-auto text-zinc-600 mb-3" />
        <div className="font-display text-base font-semibold text-zinc-200">No builds match your filters</div>
        <div className="text-[12.5px] text-zinc-500 mt-1">Try clearing them, or log a new build.</div>
      </div>
    );
  }

  return (
    <div className="card overflow-hidden">
      <div className="px-5 py-3 border-b flex items-center text-[10.5px] font-mono uppercase tracking-widest text-zinc-500"
           style={{ borderColor: 'var(--border-faint)' }}>
        <span className="w-[88px]">Status</span>
        <span className="w-[64px]">Version</span>
        <span className="w-[56px]">Phase</span>
        <span className="flex-1">Unit</span>
        <span className="w-[110px] hidden md:block text-right">Tests / RLS</span>
        <span className="w-[110px] hidden lg:block text-right">When</span>
        <span className="w-[36px]"></span>
      </div>
      <div ref={containerRef} style={{ maxHeight: 'calc(100vh - 360px)', minHeight: 480, overflowY: 'auto', position: 'relative' }}>
        <div style={{ height: totalH, position: 'relative' }}>
          <div style={{ position: 'absolute', top: offsetTop, left: 0, right: 0 }}>
            {slice.map(b => (
              <HistoryRow key={b.id} build={b} height={ROW_H} onSelect={onSelect} onDelete={onDelete} />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function DiffMiniStat({ label, value }) {

function DiffPanel({ a, b }) {
  const fieldDiffs = useMemo(() => {
    const fields = [
      ['phase', 'Phase'],
      ['unit', 'Unit'],
      ['migration.status', 'Migration status'],
      ['migration.file', 'Migration file'],
      ['ui', 'UI status'],
      ['committed', 'Committed'],
      ['gitSha', 'Git SHA'],
      ['blockedBy', 'Blocked by'],
      ['nextUnit', 'Next unit'],
    ];
    return fields.map(([key, label]) => {
      const av = getPath(a, key); const bv = getPath(b, key);
      return { label, key, av, bv, changed: String(av || '') !== String(bv || '') };
    });
  }, [a, b]);

  const testDelta = b.tests.passed - a.tests.passed;
  const testTotalDelta = b.tests.total - a.tests.total;
  const rlsDelta = b.rlsTests.passed - a.rlsTests.passed;
  const rlsTotalDelta = b.rlsTests.total - a.rlsTests.total;

  // Checklist diff
  const checklistDiff = useMemo(() => {
    const am = new Map((a.checklist || []).map(c => [normalizeChecklistKey(c.label), c]));
    const bm = new Map((b.checklist || []).map(c => [normalizeChecklistKey(c.label), c]));
    const added = [], removed = [], flipped = [], same = [];
    for (const [k, ci] of bm) {
      if (!am.has(k)) added.push(ci);
      else if (am.get(k).status !== ci.status) flipped.push({ from: am.get(k), to: ci });
      else same.push(ci);
    }
    for (const [k, ci] of am) {
      if (!bm.has(k)) removed.push(ci);
    }
    return { added, removed, flipped, same };
  }, [a, b]);

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <DeltaCard label="Tests Δ" delta={testDelta} sub={`Total Δ ${signed(testTotalDelta)}`} />
        <DeltaCard label="RLS Δ" delta={rlsDelta} sub={`Total Δ ${signed(rlsTotalDelta)}`} />
        <DeltaCard label="Version Δ" delta={b.version - a.version} sub={`v${a.version} → v${b.version}`} verbatim />
      </div>

      <div className="card overflow-hidden">
        <div className="px-5 py-3 border-b flex items-center text-[11px] font-mono uppercase tracking-widest text-zinc-500"
             style={{ borderColor: 'var(--border-faint)' }}>
          <span className="flex-1">Field</span>
          <span className="w-[34%]">v{a.version}</span>
          <span className="w-[34%]">v{b.version}</span>
        </div>
        {fieldDiffs.map(d => (
          <div key={d.key} className={`flex items-stretch text-[13px] ${d.changed ? 'diff-change' : 'diff-same'} border-b px-5 py-2.5`}
               style={{ borderColor: 'var(--border-faint)' }}>
            <span className="flex-1 text-zinc-400">{d.label}</span>
            <span className="w-[34%] font-mono text-zinc-300 truncate">{renderVal(d.av)}</span>
            <span className={`w-[34%] font-mono truncate ${d.changed ? 'text-zinc-100' : 'text-zinc-500'}`}>{renderVal(d.bv)}</span>
          </div>
        ))}
      </div>

      <div className="card p-5">
        <div className="flex items-center justify-between mb-3">
          <h4 className="font-display text-[14px] font-semibold text-zinc-100">Checklist diff</h4>
          <div className="text-[11px] font-mono uppercase tracking-widest text-zinc-500">
            +{checklistDiff.added.length} added · {checklistDiff.removed.length} removed · {checklistDiff.flipped.length} flipped
          </div>
        </div>
        <div className="space-y-1.5">
          {checklistDiff.added.map((c, i) => (
            <div key={'a'+i} className="diff-add rounded-md px-3 py-2 text-[12.5px] flex items-center gap-2">
              <IcPlus size={12} className="text-emerald-300" />
              <span className="text-zinc-100">{c.label}</span>
              <span className={`chip ${c.status === 'pass' ? 'chip-green' : 'chip-red'} ml-auto`}>{c.status}</span>
            </div>
          ))}
          {checklistDiff.removed.map((c, i) => (
            <div key={'r'+i} className="diff-remove rounded-md px-3 py-2 text-[12.5px] flex items-center gap-2">
              <IcX size={12} className="text-rose-300" />
              <span className="text-zinc-200">{c.label}</span>
              <span className={`chip ${c.status === 'pass' ? 'chip-green' : 'chip-red'} ml-auto`}>{c.status}</span>
            </div>
          ))}
          {checklistDiff.flipped.map((c, i) => (
            <div key={'f'+i} className="diff-change rounded-md px-3 py-2 text-[12.5px] flex items-center gap-2">
              <IcRefresh size={12} className="text-blue-300" />
              <span className="text-zinc-100">{c.to.label}</span>
              <span className="ml-auto flex items-center gap-2">
                <span className={`chip ${c.from.status === 'pass' ? 'chip-green' : 'chip-red'}`}>{c.from.status}</span>
                <IcArrowRight size={12} className="text-zinc-500" />
                <span className={`chip ${c.to.status === 'pass' ? 'chip-green' : 'chip-red'}`}>{c.to.status}</span>
              </span>
            </div>
          ))}
          {checklistDiff.added.length + checklistDiff.removed.length + checklistDiff.flipped.length === 0 && (
            <div className="text-center py-6 text-[12.5px] text-zinc-500">No checklist changes between these versions.</div>
          )}
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div className="card p-5">
          <div className="text-[11px] font-mono uppercase tracking-widest text-zinc-500 mb-2">What went wrong — v{a.version}</div>
          <p className="text-[13px] text-zinc-200 leading-relaxed">{a.whatWentWrong || '—'}</p>
        </div>
        <div className="card p-5">
          <div className="text-[11px] font-mono uppercase tracking-widest text-zinc-500 mb-2">What went wrong — v{b.version}</div>
          <p className={`text-[13px] leading-relaxed ${a.whatWentWrong !== b.whatWentWrong ? 'text-amber-200' : 'text-zinc-200'}`}>{b.whatWentWrong || '—'}</p>
        </div>
      </div>
    </div>
  );
}

function DeltaCard({ label, delta, sub, verbatim }) {
  const positive = delta > 0;
  const negative = delta < 0;
  return (
    <div className="card p-4">
      <div className="text-[10.5px] font-mono uppercase tracking-widest text-zinc-500 mb-2">{label}</div>
      <div className={`font-display text-[24px] font-semibold ${verbatim ? 'text-zinc-100' : positive ? 'text-emerald-300' : negative ? 'text-rose-300' : 'text-zinc-300'}`}>
        {verbatim ? delta : signed(delta)}
      </div>
      <div className="text-[11.5px] text-zinc-500 mt-1">{sub}</div>
    </div>
  );
}

function signed(n) { return n > 0 ? `+${n}` : `${n}`; }
function getPath(obj, path) { return path.split('.').reduce((o, k) => (o == null ? o : o[k]), obj); }
function renderVal(v) {
  if (v === true) return 'true';
  if (v === false) return 'false';
  if (v == null || v === '') return '—';
  return String(v);
}
function normalizeChecklistKey(s) { return (s || '').trim().toLowerCase().replace(/\s+/g, ' '); }

/* =========================== CHECKLIST =========================== */
function ChecklistView({ builds, onSelect, updateBuild }) {
  const recurring = useMemo(() => {
    const fails = new Map(); // label -> { count, lastSeen, lastBuild }
    for (const b of builds) {
      for (const c of (b.checklist || [])) {
        if (c.status === 'fail') {
          const k = normalizeChecklistKey(c.label);
          const cur = fails.get(k) || { label: c.label, count: 0, builds: [] };
          cur.count++;
          cur.builds.push({ id: b.id, version: b.version, timestamp: b.timestamp, unit: b.unit });
          fails.set(k, cur);
        }
      }
    }
    return Array.from(fails.values()).sort((a, b) => b.count - a.count);
  }, [builds]);

  const buildsWithList = useMemo(() => builds.filter(b => (b.checklist || []).length > 0), [builds]);

  return (
    <div className="space-y-6">
      <SectionHeader
        eyebrow="Quality gate"
        title="Checklist"
        subtitle={`Per-build pass/fail items, plus recurring failure roll-up across ${builds.length} builds.`}
      />

      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div className="card p-5">
          <div className="flex items-center justify-between mb-4">
            <h4 className="font-display text-[14px] font-semibold text-zinc-100 flex items-center gap-2">
              <IcFlame size={14} className="text-rose-400" /> Recurring failures
            </h4>
            <span className="text-[11px] font-mono uppercase tracking-widest text-zinc-500">{recurring.length} patterns</span>
          </div>
          {recurring.length === 0 ? (
            <div className="text-center py-8">
              <IcCheckCircle size={28} className="mx-auto text-emerald-400 mb-2" />
              <div className="text-[13px] text-zinc-300 font-medium">No recurring failures yet</div>
              <div className="text-[11.5px] text-zinc-500 mt-1">Log builds with failing checklist items to surface patterns.</div>
            </div>
          ) : (
            <div className="space-y-2 max-h-[420px] overflow-y-auto pr-2">
              {recurring.map((r, i) => (
                <div key={i} className="rounded-lg p-3" style={{ background: 'rgba(248,113,113,0.04)', border: '1px solid rgba(248,113,113,0.18)' }}>
                  <div className="flex items-center justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="text-[13px] font-medium text-zinc-100 truncate">{r.label}</div>
                      <div className="text-[11px] text-zinc-500 mt-0.5">
                        {r.builds.slice(0, 4).map(b => `v${b.version}`).join(' · ')}
                        {r.builds.length > 4 ? ` · +${r.builds.length - 4} more` : ''}
                      </div>
                    </div>
                    <span className="chip chip-red font-mono">{r.count}×</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="card p-5">
          <h4 className="font-display text-[14px] font-semibold text-zinc-100 mb-4 flex items-center gap-2">
            <IcListChecks size={14} className="text-amber-300" /> Per-build checklists
          </h4>
          {buildsWithList.length === 0 ? (
            <div className="text-center py-8">
              <IcInfo size={26} className="mx-auto text-zinc-600 mb-2" />
              <div className="text-[13px] text-zinc-300 font-medium">No checklists captured yet</div>
              <div className="text-[11.5px] text-zinc-500 mt-1">Add checklist items when logging a build to track granular pass/fail.</div>
            </div>
          ) : (
            <div className="space-y-3 max-h-[420px] overflow-y-auto pr-2">
              {buildsWithList.map(b => {
                const pass = (b.checklist || []).filter(c => c.status === 'pass').length;
                const tot = (b.checklist || []).length;
                return (
                  <button key={b.id} onClick={() => onSelect(b)} className="w-full text-left rounded-lg p-3 card-hover transition" style={{ background: 'rgba(11,11,17,0.4)', border: '1px solid var(--border-faint)' }}>
                    <div className="flex items-center justify-between mb-2">
                      <div className="flex items-center gap-2 min-w-0">
                        <span className="font-mono text-[12.5px] text-zinc-100 font-semibold">v{b.version}</span>
                        <span className="text-[10.5px] font-mono uppercase tracking-widest text-zinc-500">P{String(b.phase || '?').padStart(2,'0')}</span>
                        <span className="text-[13px] text-zinc-200 truncate">{b.unit || '(unnamed)'}</span>
                      </div>
                      <span className={`chip ${pass === tot ? 'chip-green' : 'chip-amber'} font-mono`}>{pass}/{tot}</span>
                    </div>
                    <div className="progress-track"><div className="progress-fill" style={{ width: `${ratio(pass, tot)}%` }}></div></div>
                  </button>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ============================== LOG ============================== */
function LogView({ builds, onSelect }) {
  const items = useMemo(() => {
    const arr = [];
    for (const b of builds) {
      if (b.whatWentWell) arr.push({ kind: 'good', text: b.whatWentWell, build: b });
      if (b.whatWentWrong) arr.push({ kind: 'bad', text: b.whatWentWrong, build: b });
      if (b.blockedBy && b.blockedBy.toLowerCase() !== 'none') arr.push({ kind: 'block', text: b.blockedBy, build: b });
    }
    arr.sort((a, b) => (b.build.timestamp || '').localeCompare(a.build.timestamp || ''));
    return arr;
  }, [builds]);

  const [filter, setFilter] = useState('all');
  const filtered = filter === 'all' ? items : items.filter(i => i.kind === filter);

  return (
    <div className="space-y-6">
      <SectionHeader
        eyebrow="Storytelling"
        title="Activity Log"
        subtitle={`${items.length} notes across ${builds.length} builds — what worked, what didn't, what's blocking.`}
      />

      <div className="flex items-center gap-2">
        <FilterPill active={filter === 'all'} onClick={() => setFilter('all')} count={items.length}>All</FilterPill>
        <FilterPill active={filter === 'good'} onClick={() => setFilter('good')} count={items.filter(i => i.kind === 'good').length} tone="green">Wins</FilterPill>
        <FilterPill active={filter === 'bad'} onClick={() => setFilter('bad')} count={items.filter(i => i.kind === 'bad').length} tone="red">Issues</FilterPill>
        <FilterPill active={filter === 'block'} onClick={() => setFilter('block')} count={items.filter(i => i.kind === 'block').length} tone="amber">Blockers</FilterPill>
      </div>

      <div className="card p-6">
        {filtered.length === 0 ? (
          <div className="text-center py-12">
            <IcScroll size={28} className="mx-auto text-zinc-600 mb-3" />
            <div className="text-[13px] text-zinc-400">No entries in this view.</div>
          </div>
        ) : (
          <div className="relative pl-7">
            <div className="absolute left-2 top-2 bottom-2 w-px" style={{ background: 'linear-gradient(180deg, transparent, var(--border-soft), transparent)' }}></div>
            {filtered.map((it, i) => <TimelineItem key={i} item={it} onSelect={onSelect} />)}
          </div>
        )}
      </div>
    </div>
  );
}

function FilterPill({ active, onClick, count, tone, children }) {
  const toneCls = active
    ? (tone === 'green' ? 'border-emerald-500/40 text-emerald-200 bg-emerald-500/10'
       : tone === 'red' ? 'border-rose-500/40 text-rose-200 bg-rose-500/10'
       : tone === 'amber' ? 'border-amber-500/40 text-amber-200 bg-amber-500/10'
       : 'border-zinc-500/40 text-zinc-100 bg-zinc-500/10')
    : 'border-zinc-700/50 text-zinc-400 bg-transparent hover:bg-zinc-800/40';
  return (
    <button onClick={onClick} className={`px-3 py-1.5 rounded-full border text-[12.5px] font-medium transition flex items-center gap-2 ${toneCls}`}>
      {children}
      <span className="font-mono text-[10.5px] opacity-70">{count}</span>
    </button>
  );
}

function TimelineItem({ item, onSelect }) {
  const tone = item.kind === 'good' ? { dot: 'bg-emerald-400', label: 'WIN', cls: 'chip-green', icon: <IcCheckCircle size={12} stroke={2} /> }
            : item.kind === 'bad' ? { dot: 'bg-rose-400', label: 'ISSUE', cls: 'chip-red', icon: <IcXCircle size={12} stroke={2} /> }
            : { dot: 'bg-amber-400', label: 'BLOCKED BY', cls: 'chip-amber', icon: <IcAlert size={12} stroke={2} /> };
  return (
    <div className="relative pb-5 fade-in">
      <span className={`absolute -left-[1.55rem] top-1.5 w-2.5 h-2.5 rounded-full ${tone.dot}`} style={{ boxShadow: '0 0 0 4px var(--bg-deep)' }}></span>
      <div className="flex items-center gap-2 mb-1.5">
        <span className={`chip ${tone.cls}`}>{tone.icon} {tone.label}</span>
        <button onClick={() => onSelect(item.build)} className="font-mono text-[11.5px] text-zinc-400 hover:text-amber-300 transition">
          v{item.build.version} · P{String(item.build.phase || '?').padStart(2,'0')} · {item.build.unit || '(unnamed)'}
        </button>
        <span className="text-[11px] text-zinc-500 ml-auto font-mono">{formatRelative(item.build.timestamp)}</span>
      </div>
      <p className="text-[13.5px] text-zinc-100 leading-relaxed">{item.text}</p>
    </div>
  );
}

/* ========================== ADD MODAL ============================ */
function AddBuildModal({ defaultVersion, onClose, onSubmit }) {
  const [data, setData] = useState({
    version: defaultVersion,
    phase: 1,
    unit: '',
    migrationStatus: 'Pending',
    migrationFile: '',
    testsPassed: 0,
    testsTotal: 0,
    rlsPassed: 0,
    rlsTotal: 0,
    ui: 'Pending',
    committed: false,
    gitSha: '',
    whatWentWell: '',
    whatWentWrong: '',
    blockedBy: '',
    nextUnit: '',
    checklist: [],
  });
  const [submitting, setSubmitting] = useState(false);

  const setF = (k, v) => setData(d => ({ ...d, [k]: v }));

  const addItem = () => setF('checklist', [...data.checklist, { label: '', status: 'pass' }]);
  const updateItem = (i, patch) => setF('checklist', data.checklist.map((c, idx) => idx === i ? { ...c, ...patch } : c));
  const removeItem = (i) => setF('checklist', data.checklist.filter((_, idx) => idx !== i));

  const handle = async (e) => {
    e.preventDefault();
    setSubmitting(true);
    const payload = {
      version: Number(data.version) || defaultVersion,
      phase: Number(data.phase),
      unit: data.unit.trim(),
      migration: { status: data.migrationStatus, file: data.migrationFile.trim() },
      tests: { passed: Number(data.testsPassed) || 0, total: Number(data.testsTotal) || 0 },
      rlsTests: { passed: Number(data.rlsPassed) || 0, total: Number(data.rlsTotal) || 0 },
      ui: data.ui,
      committed: !!data.committed,
      gitSha: data.gitSha.trim(),
      whatWentWell: data.whatWentWell.trim(),
      whatWentWrong: data.whatWentWrong.trim(),
      blockedBy: data.blockedBy.trim(),
      nextUnit: data.nextUnit.trim(),
      checklist: data.checklist.filter(c => c.label.trim()).map(c => ({ label: c.label.trim(), status: c.status })),
    };
    await onSubmit(payload);
    setSubmitting(false);
  };

  return (
    <div className="modal-backdrop fade-in" onClick={onClose}>
      <form onSubmit={handle} className="modal-panel scale-in" onClick={(e) => e.stopPropagation()}>
        <ModalHeader title="Log new build" subtitle="All fields map to the STATUS BLOCK contract." onClose={onClose} version={data.version} />
        <div className="p-6 space-y-5">
          <Row>
            <Field label="Version" hint="Auto-incremented">
              <input type="number" min="1" className="input" value={data.version} onChange={(e) => setF('version', e.target.value)} />
            </Field>
            <Field label="Phase" hint="1–12">
              <select className="select" value={data.phase} onChange={(e) => setF('phase', e.target.value)}>
                {PHASES.map(p => <option key={p.id} value={p.id}>P{p.id} · {p.name}</option>)}
              </select>
            </Field>
            <Field label="Unit" hint="Short name" wide>
              <input className="input" placeholder="e.g. tenants_table" value={data.unit} onChange={(e) => setF('unit', e.target.value)} />
            </Field>
          </Row>

          <Row>
            <Field label="Migration status">
              <select className="select" value={data.migrationStatus} onChange={(e) => setF('migrationStatus', e.target.value)}>
                {MIGRATION_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </Field>
            <Field label="Migration file" wide>
              <input className="input font-mono" placeholder="0021_tenants.sql" value={data.migrationFile} onChange={(e) => setF('migrationFile', e.target.value)} />
            </Field>
            <Field label="UI">
              <select className="select" value={data.ui} onChange={(e) => setF('ui', e.target.value)}>
                {UI_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </Field>
          </Row>

          <Row>
            <Field label="Tests passed">
              <input type="number" min="0" className="input" value={data.testsPassed} onChange={(e) => setF('testsPassed', e.target.value)} />
            </Field>
            <Field label="Tests total">
              <input type="number" min="0" className="input" value={data.testsTotal} onChange={(e) => setF('testsTotal', e.target.value)} />
            </Field>
            <Field label="RLS passed">
              <input type="number" min="0" className="input" value={data.rlsPassed} onChange={(e) => setF('rlsPassed', e.target.value)} />
            </Field>
            <Field label="RLS total">
              <input type="number" min="0" className="input" value={data.rlsTotal} onChange={(e) => setF('rlsTotal', e.target.value)} />
            </Field>
          </Row>

          <Row>
            <Field label="Committed" hint="Tick if SHA exists">
              <label className="flex items-center gap-2 input cursor-pointer">
                <input type="checkbox" checked={data.committed} onChange={(e) => setF('committed', e.target.checked)} />
                <span className="text-[12.5px] text-zinc-300">{data.committed ? 'Yes' : 'Pending'}</span>
              </label>
            </Field>
            <Field label="Git SHA" wide>
              <input className="input font-mono" placeholder="e.g. 9f8a2b1" value={data.gitSha} onChange={(e) => setF('gitSha', e.target.value)} />
            </Field>
            <Field label="Next unit">
              <input className="input" placeholder="tenant_users" value={data.nextUnit} onChange={(e) => setF('nextUnit', e.target.value)} />
            </Field>
          </Row>

          <Field label="What went well">
            <textarea className="textarea" rows="2" value={data.whatWentWell} onChange={(e) => setF('whatWentWell', e.target.value)} placeholder="One line — what worked" />
          </Field>
          <Field label="What went wrong">
            <textarea className="textarea" rows="2" value={data.whatWentWrong} onChange={(e) => setF('whatWentWrong', e.target.value)} placeholder='One line — or "nothing"' />
          </Field>
          <Field label="Blocked by">
            <input className="input" placeholder='Dependency or "none"' value={data.blockedBy} onChange={(e) => setF('blockedBy', e.target.value)} />
          </Field>

          <div>
            <div className="flex items-center justify-between mb-2">
              <span className="text-[11px] font-mono uppercase tracking-widest text-zinc-400">Checklist (pass/fail items)</span>
              <button type="button" onClick={addItem} className="btn btn-ghost text-[12px] px-2.5 py-1.5">
                <IcPlus size={13} /> Add item
              </button>
            </div>
            {data.checklist.length === 0 ? (
              <div className="text-center py-4 rounded-lg" style={{ background: 'rgba(11,11,17,0.4)', border: '1px dashed var(--border-faint)' }}>
                <span className="text-[12px] text-zinc-500">No checklist items. Add as many as you need.</span>
              </div>
            ) : (
              <div className="space-y-2">
                {data.checklist.map((c, i) => (
                  <div key={i} className="flex items-center gap-2">
                    <input className="input flex-1" placeholder="Item label" value={c.label} onChange={(e) => updateItem(i, { label: e.target.value })} />
                    <select className="select w-[110px]" value={c.status} onChange={(e) => updateItem(i, { status: e.target.value })}>
                      <option value="pass">Pass</option>
                      <option value="fail">Fail</option>
                    </select>
                    <button type="button" onClick={() => removeItem(i)} className="p-2 rounded-md text-zinc-500 hover:text-rose-400 hover:bg-rose-500/10 transition"><IcTrash size={14} /></button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div className="p-5 border-t flex items-center justify-end gap-2 sticky bottom-0" style={{ borderColor: 'var(--border-faint)', background: 'rgba(17,17,26,0.95)' }}>
          <button type="button" onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button type="submit" disabled={submitting} className="btn btn-primary">
            {submitting ? 'Saving…' : <><IcCheck size={14} /> Save build</>}
          </button>
        </div>
      </form>
    </div>
  );
}

function Row({ children }) {
  return <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3">{children}</div>;
}
function Field({ label, hint, wide, children }) {
  return (
    <label className={`block ${wide ? 'sm:col-span-2' : ''}`}>
      <div className="flex items-baseline justify-between mb-1.5">
        <span className="text-[11px] font-mono uppercase tracking-widest text-zinc-400">{label}</span>
        {hint && <span className="text-[10.5px] text-zinc-500">{hint}</span>}
      </div>
      {children}
    </label>
  );
}

function ModalHeader({ title, subtitle, onClose, version }) {
  return (
    <div className="p-5 border-b flex items-start justify-between sticky top-0 z-10" style={{ borderColor: 'var(--border-faint)', background: 'rgba(17,17,26,0.95)', backdropFilter: 'blur(10px)' }}>
      <div>
        <h3 className="font-display text-[17px] font-semibold text-zinc-100 flex items-center gap-2">
          {title}
          {version != null && <span className="chip chip-coral">v{version}</span>}
        </h3>
        {subtitle && <p className="text-[12.5px] text-zinc-500 mt-1">{subtitle}</p>}
      </div>
      <button onClick={onClose} className="p-2 rounded-md text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/60 transition"><IcX size={16} /></button>
    </div>
  );
}

/* ========================= PASTE MODAL =========================== */
function PasteLogModal({ defaultVersion, onClose, onSubmit }) {
  const [text, setText] = useState('');
  const [parsed, setParsed] = useState(null);
  const [error, setError] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const sampleText = `### BUILD STATUS
phase: 1
unit: tenants_table
version: v${defaultVersion}
migration: Done — 0001_tenants.sql
tests: 6/6
rls_tests: 4/4
ui: Done
committed: 9f8a2b1c
what_went_well: clean RLS pair, no edge issues
what_went_wrong: nothing
blocked_by: none
next_unit: tenant_users`;

  useEffect(() => {
    if (!text.trim()) { setParsed(null); setError(''); return; }
    try {
      const p = parseStatusBlock(text);
      if (!p || !p.unit) { setError('Could not detect any STATUS BLOCK fields. Format is `key: value`.'); setParsed(null); return; }
      setError('');
      setParsed(p);
    } catch (e) {
      setError(e.message); setParsed(null);
    }
  }, [text]);

  const submit = async () => {
    if (!parsed) return;
    setSubmitting(true);
    const payload = { ...parsed, version: parsed.version || defaultVersion, checklist: [] };
    await onSubmit(payload);
    setSubmitting(false);
  };

  return (
    <div className="modal-backdrop fade-in" onClick={onClose}>
      <div className="modal-panel scale-in" onClick={(e) => e.stopPropagation()}>
        <ModalHeader title="Paste status block" subtitle="Paste the STATUS BLOCK Claude printed at the end of a unit. We parse every field." onClose={onClose} />
        <div className="p-6 space-y-5">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <div className="flex items-center justify-between mb-2">
                <span className="text-[11px] font-mono uppercase tracking-widest text-zinc-400">Raw input</span>
                <button onClick={() => setText(sampleText)} className="text-[11.5px] text-amber-300 hover:text-amber-200">Insert sample</button>
              </div>
              <textarea
                className="textarea"
                style={{ minHeight: 320 }}
                placeholder={sampleText}
                value={text}
                onChange={(e) => setText(e.target.value)}
                autoFocus
              />
              {error && (
                <div className="mt-2 text-[12px] text-rose-300 flex items-center gap-2">
                  <IcAlert size={13} /> {error}
                </div>
              )}
            </div>
            <div>
              <div className="text-[11px] font-mono uppercase tracking-widest text-zinc-400 mb-2">Parsed preview</div>
              <div className="rounded-xl p-4 space-y-2.5" style={{ background: 'rgba(11,11,17,0.5)', border: '1px solid var(--border-faint)' }}>
                {!parsed ? (
                  <div className="text-center py-10">
                    <IcClipboard size={26} className="mx-auto text-zinc-600 mb-2" />
                    <div className="text-[12.5px] text-zinc-500">Paste a STATUS BLOCK to preview the entry.</div>
                  </div>
                ) : (
                  <>
                    <KV k="Phase" v={`P${String(parsed.phase || '?').padStart(2,'0')}`} />
                    <KV k="Unit" v={parsed.unit || '—'} />
                    <KV k="Version" v={`v${parsed.version || defaultVersion}`} />
                    <KV k="Migration" v={`${parsed.migration.status}${parsed.migration.file ? ' — ' + parsed.migration.file : ''}`} />
                    <KV k="Tests" v={`${parsed.tests.passed}/${parsed.tests.total}`} />
                    <KV k="RLS tests" v={`${parsed.rlsTests.passed}/${parsed.rlsTests.total}`} />
                    <KV k="UI" v={parsed.ui} />
                    <KV k="Committed" v={parsed.committed ? parsed.gitSha : 'pending'} />
                    <KV k="Went well" v={parsed.whatWentWell || '—'} dim />
                    <KV k="Went wrong" v={parsed.whatWentWrong || '—'} dim />
                    <KV k="Blocked by" v={parsed.blockedBy || 'none'} dim />
                    <KV k="Next unit" v={parsed.nextUnit || '—'} dim />
                  </>
                )}
              </div>
            </div>
          </div>
        </div>
        <div className="p-5 border-t flex items-center justify-between" style={{ borderColor: 'var(--border-faint)', background: 'rgba(17,17,26,0.95)' }}>
          <div className="text-[11.5px] text-zinc-500">
            {parsed ? <span className="flex items-center gap-2"><IcCheckCircle size={13} className="text-emerald-400" /> Block parsed cleanly</span> : <span>Waiting for valid block…</span>}
          </div>
          <div className="flex gap-2">
            <button onClick={onClose} className="btn btn-ghost">Cancel</button>
            <button onClick={submit} disabled={!parsed || submitting} className="btn btn-primary disabled:opacity-50 disabled:cursor-not-allowed">
              {submitting ? 'Saving…' : <><IcCheck size={14} /> Log build</>}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function KV({ k, v, dim }) {
  return (
    <div className="flex items-baseline gap-3 text-[12.5px]">
      <span className="w-[100px] flex-shrink-0 text-zinc-500 font-mono text-[10.5px] uppercase tracking-widest">{k}</span>
      <span className={`flex-1 font-mono ${dim ? 'text-zinc-400' : 'text-zinc-100'}`}>{v}</span>
    </div>
  );
}

        </div>
        <div className="p-5 border-t flex justify-end gap-2" style={{ borderColor: 'var(--border-faint)' }}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={() => file && onImport(file, mode)} disabled={!file} className="btn btn-primary disabled:opacity-50">Import</button>
        </div>
      </div>
    </div>
  );
}

function ConfirmModal({ title, description, confirmLabel, cancelLabel = 'Cancel', danger, onConfirm, onCancel }) {
  const [typed, setTyped] = useState('');
  const need = 'DELETE';
  const enabled = !danger || typed === need;
  return (
    <div className="modal-backdrop fade-in" onClick={onCancel}>
      <div className="modal-panel scale-in" style={{ maxWidth: 480 }} onClick={(e) => e.stopPropagation()}>
        <div className="p-6">
          <div className="flex items-start gap-3 mb-4">
            <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${danger ? 'bg-rose-500/10 text-rose-300' : 'bg-amber-500/10 text-amber-300'}`}>
              <IcAlert size={20} />
            </div>
            <div className="flex-1">
              <h3 className="font-display text-[16px] font-semibold text-zinc-100">{title}</h3>
              <p className="text-[13px] text-zinc-400 mt-1 leading-relaxed">{description}</p>
            </div>
          </div>
          {danger && (
            <div className="mb-4">
              <div className="text-[11px] font-mono uppercase tracking-widest text-zinc-500 mb-1">Type <span className="text-rose-300">{need}</span> to confirm</div>
              <input className="input font-mono" value={typed} onChange={(e) => setTyped(e.target.value)} placeholder={need} />
            </div>
          )}
        </div>
        <div className="p-5 border-t flex justify-end gap-2" style={{ borderColor: 'var(--border-faint)' }}>
          <button onClick={onCancel} className="btn btn-ghost">{cancelLabel}</button>
          <button onClick={onConfirm} disabled={!enabled} className={`${danger ? 'btn btn-danger' : 'btn btn-primary'} disabled:opacity-40 disabled:cursor-not-allowed`}>
            {confirmLabel}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ========================= DETAIL DRAWER ========================= */
function DetailDrawer({ build, onClose, onUpdate, onDelete }) {
  const [draft, setDraft] = useState(build);
  useEffect(() => { setDraft(build); }, [build.id]);
  const status = overallStatus(build);
  return (
    <>
      <div className="drawer-backdrop fade-in" onClick={onClose}></div>
      <aside className="drawer-panel" onClick={(e) => e.stopPropagation()}>
        <div className="p-5 border-b sticky top-0 z-10" style={{ borderColor: 'var(--border-faint)', background: 'var(--bg-elev)', backdropFilter: 'blur(10px)' }}>
          <div className="flex items-start justify-between">
            <div>
              <div className="flex items-center gap-2 mb-1.5">
                <span className={`chip ${statusChipForOverall(status)}`}><StatusIcon status={status} /> {status.replace('_',' ')}</span>
                <span className="chip chip-coral">v{build.version}</span>
                <span className="chip chip-gray">P{String(build.phase || '?').padStart(2,'0')}</span>
              </div>
              <h3 className="font-display text-[18px] font-semibold text-zinc-50">{build.unit || '(unnamed unit)'}</h3>
              <p className="text-[11.5px] text-zinc-500 mt-1 font-mono">{formatDate(build.timestamp)}</p>
            </div>
            <button onClick={onClose} className="p-2 rounded-md text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/60 transition"><IcX size={16} /></button>
          </div>
        </div>
        <div className="p-5 space-y-5">
          <div className="grid grid-cols-3 gap-3">
            <DetailMetric label="Tests" value={`${build.tests.passed}/${build.tests.total}`} pct={ratio(build.tests.passed, build.tests.total)} />
            <DetailMetric label="RLS" value={`${build.rlsTests.passed}/${build.rlsTests.total}`} pct={ratio(build.rlsTests.passed, build.rlsTests.total)} />
            <DetailMetric label="UI" value={build.ui} />
          </div>
          <DetailGroup title="Migration">
            <KV k="Status" v={<span className={`chip ${statusChipClass(build.migration?.status)}`}>{build.migration?.status || '—'}</span>} />
            <KV k="File" v={build.migration?.file || '—'} />
          </DetailGroup>
          <DetailGroup title="Commit">
            <KV k="Committed" v={build.committed ? <span className="chip chip-green">yes</span> : <span className="chip chip-gray">pending</span>} />
            <KV k="Git SHA" v={build.gitSha || '—'} />
          </DetailGroup>
          <DetailGroup title="Outcomes">
            <KV k="Went well" v={build.whatWentWell || '—'} dim />
            <KV k="Went wrong" v={build.whatWentWrong || '—'} dim />
            <KV k="Blocked by" v={build.blockedBy || 'none'} dim />
            <KV k="Next unit" v={build.nextUnit || '—'} dim />
          </DetailGroup>
          <DetailGroup title={`Checklist · ${build.checklist?.length || 0} items`}>
            {(!build.checklist || build.checklist.length === 0) ? (
              <div className="text-[12.5px] text-zinc-500">No checklist items captured.</div>
            ) : (
              <div className="space-y-1.5">
                {build.checklist.map((c, i) => (
                  <div key={i} className="flex items-center justify-between rounded-md px-3 py-2" style={{ background: 'rgba(11,11,17,0.4)', border: '1px solid var(--border-faint)' }}>
                    <span className="text-[12.5px] text-zinc-200 flex items-center gap-2">
                      {c.status === 'pass' ? <IcCheckCircle size={13} className="text-emerald-400" /> : <IcXCircle size={13} className="text-rose-400" />}
                      {c.label}
                    </span>
                    <span className={`chip ${c.status === 'pass' ? 'chip-green' : 'chip-red'}`}>{c.status}</span>
                  </div>
                ))}
              </div>
            )}
          </DetailGroup>
        </div>
        <div className="p-5 border-t flex justify-between sticky bottom-0" style={{ borderColor: 'var(--border-faint)', background: 'var(--bg-elev)' }}>
          <button onClick={onDelete} className="btn btn-danger"><IcTrash size={14} /> Delete</button>
          <button onClick={onClose} className="btn btn-ghost">Close</button>
        </div>
      </aside>
    </>
  );
}

function DetailGroup({ title, children }) {
  return (
    <div className="card p-4">
      <div className="text-[10.5px] font-mono uppercase tracking-widest text-zinc-500 mb-3">{title}</div>
      <div className="space-y-2.5">{children}</div>
    </div>
  );
}

function DetailMetric({ label, value, pct }) {
  return (
    <div className="card p-3">
      <div className="text-[10px] font-mono uppercase tracking-widest text-zinc-500 mb-1">{label}</div>
      <div className="font-display text-[16px] font-semibold text-zinc-100">{value}</div>
      {pct != null && <div className="progress-track mt-2"><div className="progress-fill" style={{ width: `${pct}%` }}></div></div>}
    </div>
  );
}

/* ============================ TOAST ============================== */
function Toast({ msg, kind }) {
  const cls = kind === 'error' ? 'border-rose-500/40 text-rose-200'
            : kind === 'success' ? 'border-emerald-500/40 text-emerald-200'
            : 'border-zinc-700 text-zinc-200';
  const I = kind === 'error' ? IcXCircle : kind === 'success' ? IcCheckCircle : IcInfo;
  return (
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] scale-in">
      <div className={`flex items-center gap-2 px-4 py-2.5 rounded-xl border ${cls}`}
           style={{ background: 'rgba(17,17,26,0.95)', backdropFilter: 'blur(10px)', boxShadow: '0 12px 32px -8px rgba(0,0,0,0.6)' }}>
        <I size={15} />
        <span className="text-[13px]">{msg}</span>
      </div>
    </div>
  );
}

/* ============================ MOUNT ============================== */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
